<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LUMINARY — Login</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-page">

<div class="auth-split">
  <!-- LEFT PANEL -->
  <div class="auth-visual">
    <div class="auth-visual-inner">
      <div class="av-brand">
        <span class="brand-icon">✦</span>
        <span class="brand-name">LUMINARY</span>
      </div>
      <h2 class="av-tagline">Your world of<br/><em>curated luxury</em><br/>awaits.</h2>
      <div class="av-decor">
        <div class="decor-circle c1"></div>
        <div class="decor-circle c2"></div>
        <div class="decor-circle c3"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="auth-form-panel">
    <div class="auth-form-wrap">
      <div class="auth-form-header">
        <h1>Welcome back</h1>
        <p>Sign in to your account to continue</p>
      </div>

      <div class="auth-message" id="authMessage"></div>

      <form class="auth-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <i class="fa fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="you@example.com" required/>
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="fa fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="••••••••" required/>
            <button type="button" class="toggle-pass" id="togglePass"><i class="fa fa-eye"></i></button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe"/>
            <span class="checkmark"></span>
            Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="auth-submit" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <i class="fa fa-arrow-right"></i>
          <span class="btn-loader" id="btnLoader" style="display:none"><i class="fa fa-spinner fa-spin"></i></span>
        </button>
      </form>

      <div class="auth-divider"><span>or continue with</span></div>

      <div class="social-auth">
        <button class="social-btn google-btn">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="social-btn github-btn">
          <i class="fab fa-github"></i> GitHub
        </button>
      </div>

      <p class="auth-switch">
        Don't have an account? <a href="register.html">Create one →</a>
      </p>
    </div>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
